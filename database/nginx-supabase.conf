# ============================================================
# NGINX - Proxy Reverso para Supabase
# Arquivo: /etc/nginx/sites-available/disc.vanguardigroup.com.br
# ============================================================
#
# Este bloco adiciona o proxy /api → Supabase (porta 8000 local).
# Resolve o problema de Mixed Content (HTTPS → HTTP).
#
# INSTRUÇÃO:
#   Encontre o bloco "server { ... }" do seu domínio no nginx
#   e adicione o bloco "location /api/" dentro dele.
#   Depois: nginx -t && systemctl reload nginx
# ============================================================

server {
    listen 443 ssl;
    server_name disc.vanguardigroup.com.br;

    # --- Seus certificados SSL (Certbot/Let's Encrypt) ---
    # ssl_certificate     /etc/letsencrypt/live/disc.vanguardigroup.com.br/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/disc.vanguardigroup.com.br/privkey.pem;

    # --- Arquivos do site (HTML, JS, CSS, imagens) ---
    root /var/www/disc.vanguardigroup.com.br;   # ajuste para o seu caminho real
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ============================================================
    # PROXY SUPABASE — ADICIONE ESTE BLOCO
    # Redireciona /api/* → http://127.0.0.1:8000/*
    # ============================================================
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# Redireciona HTTP → HTTPS
server {
    listen 80;
    server_name disc.vanguardigroup.com.br;
    return 301 https://$host$request_uri;
}
